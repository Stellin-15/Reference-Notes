# ============================================================
# L08: Kubernetes Production Architecture (Millions of Users)
# ============================================================
# WHAT: The full set of Kubernetes primitives, configurations, and
#       patterns required to run a production system at scale — covering
#       scheduling, security, observability, GitOps, and incident response.
# WHY:  "It works on my laptop" configurations collapse under real traffic.
#       Production K8s requires deliberate decisions on scheduling policy,
#       security posture, observability, and operational runbooks.
# LEVEL: Advanced
# ============================================================
# CONCEPT OVERVIEW:
#   Production K8s is not about any single feature — it's the
#   combination of many defaults changed intentionally:
#     - WHERE pods run (topology, affinity, priority)
#     - HOW they communicate (NetworkPolicy default-deny)
#     - HOW MUCH they consume (ResourceQuota, LimitRange)
#     - HOW SAFE they run (PodSecurity, non-root, read-only FS)
#     - HOW you deploy (GitOps, ArgoCD, audit trail = git history)
#     - HOW you observe (metrics, logs, traces, alerts)
#     - HOW you respond to incidents (kubectl runbook, PDB, drain)
#
# PRODUCTION USE CASE:
#   Platform serving 5M DAU across 3 AWS regions:
#     - 3 EKS clusters (us-east-1, eu-west-1, ap-southeast-1)
#     - Each cluster: 3 AZs, Cluster Autoscaler, 20-100 nodes
#     - ArgoCD syncs all 3 clusters from a single git repo
#     - Prometheus + Grafana in each cluster, Thanos for global view
#     - PagerDuty alerts routed from AlertManager
#
# COMMON MISTAKES:
#   - No topology constraints — all pods scheduled to one AZ, AZ
#     failure takes down 100% of service instead of 33%.
#   - Default network policy = allow all — any compromised pod can
#     reach any database, secret store, or internal API.
#   - No ResourceQuota — one team's bad deployment consumes all
#     cluster CPU, starving every other namespace.
#   - Privileged containers or running as root — if a container is
#     compromised, attacker has root on the node.
#   - No PriorityClasses — during node shortage, K8s may evict your
#     Kafka brokers to schedule a dev batch job.
#   - Manual kubectl apply to production — no audit trail, no review,
#     no rollback to a known-good state.
# ============================================================


