# =============================================================================
# WHAT: Kubernetes ConfigMaps and Secrets — Config Management Reference
# WHY:  Every production app needs external configuration and secret management.
#       K8s Secrets are widely misunderstood — they are NOT secure by default.
#       Architects must understand the full secret management stack from
#       base64 encoding → etcd encryption → external secret stores.
# LEVEL: Senior / Architect
# =============================================================================

# =============================================================================
# CONCEPT OVERVIEW
# =============================================================================
# CONFIGMAP: Non-sensitive configuration data.
#   - Key-value pairs or entire config file contents.
#   - Used for: feature flags, database hosts, log levels, app settings.
#   - NOT for: passwords, API keys, certificates, tokens.
#
# SECRET: Sensitive data. Stored as base64 in etcd.
#   CRITICAL: base64 is NOT encryption. It is ENCODING. Anyone with access
#   to the Secret resource can decode it instantly:
#     echo "cGFzc3dvcmQ=" | base64 -d   →   password
#
#   Secrets are only "more secure" than ConfigMaps in two ways:
#     1. kubectl commands don't print Secret values by default.
#     2. Separate RBAC allows restricting who can GET secrets vs configmaps.
#
#   For real security, you need BOTH:
#     a. etcd encryption at rest (EncryptionConfiguration)
#     b. Tight RBAC on Secret resources (least-privilege access)
#
# SECRET MANAGEMENT EVOLUTION (simple to best):
#   Level 1 (avoid): Secrets in YAML committed to git — anyone with repo access
#     can decode. This is the most common security mistake.
#   Level 2 (basic): Secrets applied manually by ops team. Not in git.
#     Problem: no audit trail, hard to rotate, human error.
#   Level 3 (better): Sealed Secrets — encrypted with cluster public key.
#     Safe to commit to git. Controller decrypts.
#   Level 4 (best): External Secrets Operator + AWS/GCP/Vault secret stores.
#     Single source of truth. Auto-rotation. Audit logs in the external store.
# =============================================================================

# =============================================================================
# PRODUCTION USE CASE
# =============================================================================
# Payment API service:
#   - DB password from AWS Secrets Manager (auto-rotated every 30 days)
#   - App config (feature flags, log level) from ConfigMap
#   - TLS cert from cert-manager (not covered here — see L03)
#   - Service account role via IRSA (AWS IAM Roles for Service Accounts)
#   - No secrets in git. No secrets in Docker images. No secrets in env output.
# =============================================================================

# =============================================================================
# COMMON MISTAKES
# =============================================================================
# 1. Committing Secret YAML to git — base64 is trivially decoded.
#    Even in "private" repos: third-party tools, CI systems, and leaked access
#    tokens can expose the repo. Never commit Secrets to git.
# 2. Putting secrets in ConfigMaps — "it's just config". It's not. Use Secrets.
# 3. Putting secrets in Docker image (ENV in Dockerfile, COPY secret file).
#    Docker layers are cached and distributed. Anyone with image access can read them.
# 4. Env var secrets visible in: /proc/PID/environ, kubectl describe, crash dumps.
#    Volume mounts are slightly better — file not in /proc. But still readable.
#    Best: external secret store with dynamic short-lived secrets.
# 5. Not setting RBAC on Secrets — default service accounts can read all Secrets
#    in their namespace. Lock down with ResourcePolicyRule.
# 6. Forgetting that env var ConfigMaps DON'T auto-update in running pods.
#    Only volume-mounted ConfigMaps update (within ~1-2 minutes via kubelet).
# 7. Large ConfigMaps: limit is 1MB. For large configs, use a ConfigMap per file
#    or store in an object store (S3) and load at startup.
# =============================================================================

---
# ===========================================================================
# PART 1: CONFIGMAP — Key-Value Configuration
# ===========================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-api-config
  namespace: payments
  labels:
    app: payment-api
    managed-by: helm               # Track who created this resource.

# data: key-value pairs. Values are plain strings (not base64).
# Contrast with Secret.data: values MUST be base64-encoded.
# Secret.stringData: plain strings (K8s encodes them automatically). Easier.
data:
  # Simple key-value pairs: good for single config values.
  LOG_LEVEL: "info"
  APP_ENV: "production"
  PORT: "8080"
  MAX_POOL_SIZE: "20"

  # Feature flags: simple boolean strings.
  # Your app reads these as strings and parses them: feature_enabled = os.getenv("FEATURE_3DS2") == "true"
  FEATURE_3DS2: "true"
  FEATURE_NEW_CHECKOUT: "false"

  # Non-sensitive connection strings (host only — password is in Secret).
  # Pattern: split connection info. Host/port in ConfigMap, credentials in Secret.
  DB_HOST: "postgres-primary.payments.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "payments_prod"
  REDIS_HOST: "redis-cluster.payments.svc.cluster.local"
  REDIS_PORT: "6379"

  # Multi-line config file: key is the filename, value is the file content.
  # When mounted as a volume, each key becomes a file at the mount path.
  # kubectl create configmap payment-api-config --from-file=config.yaml=./config.yaml
  config.yaml: |
    # Application configuration loaded at startup.
    # This entire block is one ConfigMap value.
    server:
      port: 8080
      graceful_shutdown_timeout: 60s
      request_timeout: 30s
      max_request_body_mb: 10

    database:
      pool:
        min_size: 5
        max_size: 20
        idle_timeout: 300s
        max_lifetime: 3600s

    observability:
      tracing:
        enabled: true
        sampling_rate: 0.1          # Sample 10% of traces in production.
        jaeger_endpoint: "http://jaeger.monitoring.svc.cluster.local:14268"
      metrics:
        enabled: true
        port: 9090

    feature_flags:
      new_checkout: false
      three_ds2: true
      instant_notifications: true

  # nginx.conf example: config file for nginx sidecar or reverse proxy pod.
  # Mounted at /etc/nginx/nginx.conf
  nginx.conf: |
    worker_processes auto;
    events {
      worker_connections 1024;
    }
    http {
      upstream payment-api {
        server localhost:8080;
        keepalive 32;
      }
      server {
        listen 80;
        location / {
          proxy_pass http://payment-api;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
        }
      }
    }

---
# ===========================================================================
# PART 2: SECRET — Sensitive Data
# ===========================================================================
# IMPORTANT: In practice, never write actual secrets in YAML files.
# The values below are for illustration only (fake data).
# In a real cluster, create secrets via:
#   kubectl create secret generic payment-api-secrets \
#     --from-literal=db-password=<real-password> \
#     --from-literal=stripe-secret-key=<real-key> \
#     -n payments
# Or use External Secrets Operator (see Part 5 below) — the recommended way.
apiVersion: v1
kind: Secret
metadata:
  name: payment-api-secrets
  namespace: payments
  labels:
    app: payment-api
  annotations:
    # If using External Secrets Operator to sync, it manages this Secret.
    # Track the source for operational clarity.
    source: "aws-secrets-manager"
    secret-arn: "arn:aws:secretsmanager:us-east-1:123456789:secret:payment-api-prod"

# type: Opaque is the generic type. Other built-in types:
#   kubernetes.io/tls              - TLS certificates. Keys: tls.crt, tls.key
#   kubernetes.io/dockerconfigjson - Docker registry credentials
#   kubernetes.io/service-account-token - SA token (created automatically by K8s)
#   kubernetes.io/basic-auth       - username + password
#   kubernetes.io/ssh-auth         - SSH private key
type: Opaque

# data: ALL values MUST be base64-encoded. K8s will reject un-encoded values.
# To encode: echo -n "mypassword" | base64
# To decode: echo "bXlwYXNzd29yZA==" | base64 -d
# NOTE: -n flag removes the trailing newline (very important — newline changes hash).
#
# AGAIN: base64 is trivially reversible. This provides NO security.
# Security comes from: RBAC restrictions + etcd encryption (see Part 3).
data:
  db-password: "cGFzc3dvcmQxMjM="           # base64("password123") — FAKE
  stripe-secret-key: "c2tfdGVzdF9leGFtcGxl"  # base64("sk_test_example") — FAKE
  jwt-secret: "c3VwZXJzZWNyZXRqd3Rr"         # base64("supersecretjwtk") — FAKE

# stringData: plain text alternative to data. K8s base64-encodes automatically.
# Use stringData when creating Secrets from scripts/generators.
# IMPORTANT: stringData values are NOT shown in kubectl get secret (they merge into data).
# Cannot use both data and stringData for the same key in the same Secret.
stringData:
  # Example: multi-line private key (PEM format). Hard to base64 manually.
  # In practice this would come from cert-manager or External Secrets Operator.
  # private-key.pem: |
  #   -----BEGIN RSA PRIVATE KEY-----
  #   MIIEpAIBAAKCAQEA...
  #   -----END RSA PRIVATE KEY-----
  api-config-override: "max_retries=3"

---
# ===========================================================================
# PART 3: ETCD ENCRYPTION AT REST — The missing piece for real secret security
# ===========================================================================
# By default, K8s Secrets are stored as base64 in etcd — effectively plaintext.
# Anyone with etcd access (etcd backup, etcd read access) can read all Secrets.
#
# EncryptionConfiguration: tells the API server to encrypt resources before
# writing to etcd. Applied as a file on the API server (not a K8s resource).
#
# File location: typically /etc/kubernetes/encryption-config.yaml
# API server flag: --encryption-provider-config=/etc/kubernetes/encryption-config.yaml
#
# This is a CLUSTER-LEVEL configuration — requires API server restart.
# On managed clusters (EKS, GKE, AKE), enable via cluster settings:
#   EKS: Envelope encryption with AWS KMS — enable in EKS console or via Terraform.
#   GKE: Application-layer encryption — Cloud KMS key specified in cluster config.
#   AKS: Customer-managed keys — Azure Key Vault integration.

# EncryptionConfiguration reference (as YAML comment — not a K8s API resource):
#
# apiVersion: apiserver.config.k8s.io/v1
# kind: EncryptionConfiguration
# resources:
#   - resources:
#       - secrets               # Encrypt ALL secrets.
#     providers:
#       # kms: Best security. Key never leaves KMS. Requires network call on decrypt.
#       # Slight latency overhead (~1-2ms per secret access).
#       - kms:
#           name: aws-kms
#           endpoint: unix:///var/run/kmsplugin/socket.sock  # KMS plugin socket.
#           cachesize: 1000           # Cache decrypted DEKs. Reduces KMS calls.
#           timeout: 3s
#
#       # aescbc: AES-256-CBC. Good when KMS is not available. Key in this file.
#       # Rotating the key requires re-encrypting all Secrets (expensive).
#       - aescbc:
#           keys:
#             - name: key1
#               secret: <32-byte-key-base64>    # openssl rand -base64 32
#
#       # identity: plaintext fallback. LAST in list = fallback for existing data.
#       # NEVER put identity first — it disables encryption.
#       - identity: {}
#
# NOTE: After enabling, existing secrets are still plaintext in etcd.
# To re-encrypt: kubectl get secrets --all-namespaces -o json | kubectl apply -f -
# This forces API server to write all secrets through the new provider.

---
# ===========================================================================
# PART 4: USING CONFIGMAPS AND SECRETS IN PODS
# ===========================================================================
# This Pod demonstrates all four consumption patterns.
# In practice: use Deployment (same spec under .spec.template).
apiVersion: v1
kind: Pod
metadata:
  name: config-consumption-demo
  namespace: payments
spec:
  containers:
    - name: app
      image: payment-api:1.4.2
      imagePullPolicy: IfNotPresent

      env:
        # PATTERN 1: Individual key from ConfigMap as env var.
        # Does NOT update automatically when ConfigMap changes. Pod restart required.
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: payment-api-config
              key: LOG_LEVEL
              optional: false

        # PATTERN 2: Individual key from Secret as env var.
        # Same limitation: no auto-update. Slight security concern (visible in /proc).
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: payment-api-secrets
              key: db-password

      # PATTERN 3: All keys from ConfigMap as env vars (bulk import).
      # Every key in the ConfigMap becomes an env var with same name.
      # Risky: if ConfigMap gains new keys, they all become env vars (namespace pollution).
      # Prefer individual key references for production.
      envFrom:
        - configMapRef:
            name: payment-api-config
            optional: false
        # Can also bulk-import from Secret (same pattern):
        # - secretRef:
        #     name: payment-api-secrets

      volumeMounts:
        # PATTERN 4: ConfigMap as volume-mounted files.
        # IMPORTANT: These DO update automatically (within ~1-2 minutes via kubelet watch).
        # App must be written to detect and reload config files (inotify, SIGHUP).
        # Each key in the ConfigMap becomes a separate file.
        - name: app-config-volume
          mountPath: /etc/payment-api    # config.yaml → /etc/payment-api/config.yaml
          readOnly: true

        # Mount only a SPECIFIC key from ConfigMap (not all keys).
        # items: filters which keys to expose and controls filenames.
        - name: nginx-config-volume
          mountPath: /etc/nginx
          readOnly: true

        # Secret as volume: each key = file. More secure than env var.
        # Files have content = decoded value (not base64).
        # Use for: TLS certs, private keys, multi-line credentials.
        - name: secrets-volume
          mountPath: /etc/secrets        # db-password → /etc/secrets/db-password
          readOnly: true

        # Projected volume: combine multiple sources (Secret + ConfigMap + ServiceAccount token).
        # One mount point, multiple sources. Clean for apps that need several configs.
        - name: projected-config
          mountPath: /etc/app

  volumes:
    # Volume from ConfigMap: all keys become files.
    - name: app-config-volume
      configMap:
        name: payment-api-config
        defaultMode: 0444              # Files readable by all users in container.

    # Volume from ConfigMap: only specific keys, with custom filenames.
    - name: nginx-config-volume
      configMap:
        name: payment-api-config
        items:
          - key: nginx.conf            # Key in ConfigMap
            path: nginx.conf           # Filename at mountPath
            mode: 0444

    # Volume from Secret: all keys become files.
    - name: secrets-volume
      secret:
        secretName: payment-api-secrets
        defaultMode: 0400              # Only owner can read. Tighter than ConfigMap.

    # Projected volume: multiple sources in one mount.
    # ServiceAccountToken: short-lived OIDC token for cloud IAM federation.
    # expirationSeconds: 3600 = token valid 1 hour. Kubelet auto-rotates before expiry.
    - name: projected-config
      projected:
        sources:
          - configMap:
              name: payment-api-config
          - secret:
              name: payment-api-secrets
              items:
                - key: api-config-override
                  path: api-config-override.txt
          # ServiceAccount OIDC token for AWS IRSA / GCP Workload Identity.
          # The pod presents this token to AWS STS / GCP IAM to get cloud credentials.
          # No static AWS access keys needed — the token IS the credential.
          - serviceAccountToken:
              path: token
              expirationSeconds: 3600
              audience: "sts.amazonaws.com"  # AWS STS audience. GCP: "https://..."

---
# ===========================================================================
# PART 5: SEALED SECRETS — Safe to commit encrypted secrets to git
# ===========================================================================
# Install Sealed Secrets controller (one-time cluster setup):
#   helm install sealed-secrets sealed-secrets/sealed-secrets -n kube-system
#
# The controller generates an RSA key pair. Public key is public (safe to share).
# kubeseal CLI encrypts a Secret with the cluster's public key.
# Only the controller (with the private key) can decrypt it.
#
# Workflow:
#   1. Create a normal Secret YAML (with real values) locally.
#   2. kubeseal < secret.yaml > sealed-secret.yaml  (uses cluster public key)
#   3. Commit sealed-secret.yaml to git (safe — encrypted with cluster public key)
#   4. kubectl apply -f sealed-secret.yaml
#   5. Controller decrypts and creates the actual Secret in the cluster.
#
# Limitation: tied to ONE cluster. If cluster is rebuilt, key is different.
# Solution: backup the controller's signing key (k8s Secret in kube-system).
#   kubectl get secret -n kube-system -l sealedsecrets.bitnami.com/sealed-secrets-key -o yaml

# SealedSecret resource (what you commit to git — encrypted, safe):
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: payment-api-secrets-sealed
  namespace: payments
  annotations:
    # sealedsecrets.bitnami.com/managed: "true"   # Controller will manage this.
spec:
  encryptedData:
    # These are RSA-OAEP encrypted ciphertext blobs (safe to commit to git).
    # Generated by: kubeseal --format yaml < secret.yaml
    # Each value is encrypted with cluster public key. Not base64 of plaintext.
    db-password: "AgBz3K2E..."          # Fake truncated ciphertext for illustration.
    stripe-secret-key: "AgCx7M9P..."    # Real value would be much longer.

---
# ===========================================================================
# PART 6: EXTERNAL SECRETS OPERATOR — Production-grade secret management
# ===========================================================================
# External Secrets Operator (ESO): syncs secrets FROM external stores TO K8s Secrets.
# External stores: AWS Secrets Manager, GCP Secret Manager, HashiCorp Vault,
#   Azure Key Vault, 1Password, Doppler, CyberArk, and more.
#
# Install ESO (one-time cluster setup):
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets-system --create-namespace
#
# Architecture:
#   SecretStore (or ClusterSecretStore): connection config to external store.
#   ExternalSecret: maps external secret keys to K8s Secret keys.
#   ESO controller: watches ExternalSecrets, fetches from store, creates K8s Secrets.
#   Auto-refresh: re-fetches every refreshInterval. Auto-rotates K8s Secret.

# Step 1: SecretStore — how to connect to AWS Secrets Manager.
# ClusterSecretStore: works across all namespaces (better for shared infra).
# SecretStore: namespace-scoped (better for team isolation).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: payments
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1

      # Authentication via IRSA (IAM Roles for Service Accounts).
      # The Pod's ServiceAccount is annotated with an IAM Role ARN.
      # No static access keys needed. This is the correct way to auth on AWS.
      auth:
        jwt:
          serviceAccountRef:
            name: payment-api-sa        # ServiceAccount with IRSA annotation.
            # SA must have annotation:
            # eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/PaymentAPIRole
            # And the IAM role must have secretsmanager:GetSecretValue permission.

---
# Step 2: ExternalSecret — maps external secrets to K8s Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-api-external-secret
  namespace: payments
spec:
  # How often to sync from external store. Shorter = more current, more API calls.
  # For rotating secrets (e.g., RDS password rotated every 30 days): 1h is fine.
  # For certificates: must be shorter than expiry window.
  refreshInterval: "1h"

  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore

  # The K8s Secret that ESO creates and manages.
  # If this Secret already exists with different content, ESO overwrites it.
  target:
    name: payment-api-secrets           # Name of K8s Secret to create.
    creationPolicy: Owner               # ESO owns this secret (deletes it if ExternalSecret is deleted).
    # deletionPolicy: Retain            # Keep K8s Secret if ExternalSecret is deleted (safer).

    # Optional: transform the secret before storing.
    # template:
    #   data:
    #     DATABASE_URL: "postgresql://user:{{ .db-password }}@{{ .db-host }}/payments"

  data:
    # PATTERN A: Map individual keys from an AWS Secrets Manager secret.
    # remoteRef.key = AWS SM secret name (or ARN).
    # remoteRef.property = JSON key within the secret's value (if value is JSON).
    # secretKey = key in the K8s Secret.

    - secretKey: db-password
      remoteRef:
        key: "production/payment-api/database"    # AWS SM secret name
        property: password                         # JSON field in the secret value
        # version: "AWSPREVIOUS"                  # Access previous version during rotation.

    - secretKey: stripe-secret-key
      remoteRef:
        key: "production/payment-api/stripe"
        property: secret_key

    - secretKey: jwt-secret
      remoteRef:
        key: "production/payment-api/jwt"
        property: secret

  # PATTERN B: Extract all keys from an AWS SM secret at once.
  # If the SM secret value is JSON, all JSON keys become K8s Secret keys.
  dataFrom:
    - extract:
        key: "production/payment-api/all-secrets"
        # AWS SM value: {"DB_PASSWORD": "...", "API_KEY": "...", "JWT_SECRET": "..."}
        # Results in K8s Secret keys: DB_PASSWORD, API_KEY, JWT_SECRET

---
# ===========================================================================
# PART 7: IMAGEPULLSECRETS — Private Container Registries
# ===========================================================================
# If your container images are in a private registry (ECR, GCR, Artifactory),
# Kubernetes needs credentials to pull them.
#
# Create the Secret:
#   kubectl create secret docker-registry regcred \
#     --docker-server=123456789.dkr.ecr.us-east-1.amazonaws.com \
#     --docker-username=AWS \
#     --docker-password=$(aws ecr get-login-password --region us-east-1) \
#     -n payments
#
# For AWS ECR: Better approach is ECR credential helper or EC2 instance role.
# Nodes with the correct IAM role can pull from ECR without manual credentials.
# The credential helper (amazon-ecr-credential-helper) handles token refresh.

apiVersion: v1
kind: Secret
metadata:
  name: ecr-pull-secret
  namespace: payments
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "eyJhdXRocyI6..."   # base64 of docker config JSON. Fake value.

---
# ServiceAccount: attach imagePullSecrets to a service account.
# Any pod using this SA automatically gets the pull secret.
# Better than specifying imagePullSecrets on every pod individually.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-api-sa
  namespace: payments
  labels:
    app: payment-api
  annotations:
    # AWS IRSA: associate SA with IAM Role. Pod presents OIDC token to assume role.
    # Requires EKS OIDC provider configuration. No static AWS credentials needed.
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/PaymentAPIRole"
    # GCP Workload Identity equivalent:
    # iam.gke.io/gcp-service-account: "payment-api@my-project.iam.gserviceaccount.com"

# imagePullSecrets on ServiceAccount: automatically applied to all pods using this SA.
# No need to add imagePullSecrets to every pod spec.
imagePullSecrets:
  - name: ecr-pull-secret

---
# ===========================================================================
# PART 8: RBAC — Restrict who can read Secrets
# ===========================================================================
# Without RBAC, any pod in the namespace can read all Secrets.
# (If the pod's service account has default cluster permissions.)
# Best practice: explicitly deny Secret access except where needed.
#
# CRITICAL: Secrets are often readable by:
#   - Cluster admins (expected)
#   - CI/CD pipeline (often over-permissioned — audit this)
#   - Any pod with default RBAC (if default SA has broad permissions — audit this)
#   - etcd backups (encrypt your etcd backups!)

# Role: namespace-scoped permissions.
# ClusterRole: cluster-wide permissions (all namespaces).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payment-api-secret-reader
  namespace: payments
rules:
  # Explicitly allow reading ONLY the specific secrets this app needs.
  # Not a wildcard. Least-privilege principle.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "payment-api-secrets"          # Only this specific secret.
    verbs: ["get"]                     # Read-only. No create/update/delete.

---
# RoleBinding: assign the Role to the ServiceAccount.
# The payment-api pod (running as payment-api-sa) can now read payment-api-secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payment-api-secret-binding
  namespace: payments
subjects:
  - kind: ServiceAccount
    name: payment-api-sa
    namespace: payments
roleRef:
  kind: Role
  apiGroupv: rbac.authorization.k8s.io
  name: payment-api-secret-reader

---
# ===========================================================================
# QUICK REFERENCE: Secret Management Decision Tree (as comments)
# ===========================================================================
#
# Q: Should this value be in a ConfigMap or Secret?
#   → Contains credentials, tokens, keys, passwords, certs? → Secret
#   → Non-sensitive app configuration? → ConfigMap
#
# Q: My app needs to read an updated config without restarting. How?
#   → Mount ConfigMap as a volume (not env vars). Kubelet updates files within ~2 minutes.
#   → App must watch for file changes and reload (inotify, SIGHUP handler, polling).
#   → env vars from ConfigMap NEVER update without pod restart.
#
# Q: I need to store a secret safely in git. Options?
#   A1: Sealed Secrets (kubeseal) — encrypted with cluster public key.
#   A2: sops (Mozilla SOPS) — encrypt files with PGP or AWS KMS, commit ciphertext.
#   A3: Use External Secrets Operator, store nothing in git (just the ExternalSecret spec).
#
# Q: My cluster was compromised. What's the blast radius for Secrets?
#   → Without etcd encryption: ALL secrets readable (attacker has etcd).
#   → With etcd encryption + KMS: secrets are encrypted, KMS key access is audit-logged.
#   → With External Secrets + tight RBAC: individual secret access is audit-logged
#     in the external store (AWS CloudTrail, GCP Cloud Audit Logs).
#
# Q: We need secrets to rotate automatically. How?
#   → External Secrets Operator with refreshInterval: set to < rotation period.
#   → ESO re-fetches the secret periodically. If value changed, updates K8s Secret.
#   → Pods using volume-mounted secrets pick up new value within kubelet sync period.
#   → Pods using env var secrets require restart (trigger with rollout restart).
#   → HashiCorp Vault: dynamic secrets (DB passwords, AWS credentials) auto-expire.
#     Vault Agent Injector: injects fresh credentials as files on pod startup.
#
# Q: What is Vault Agent Injector?
#   → Sidecar container injected by Vault's MutatingWebhook.
#   → Authenticates to Vault using K8s service account token.
#   → Fetches secrets from Vault (dynamic DB credentials, API keys, etc.).
#   → Writes secrets as files to a shared volume (/vault/secrets/).
#   → Main container reads secrets from files (not env vars, not K8s Secrets at all).
#   → Dynamic secrets: DB password valid for 1 hour, auto-renewed by agent.
#   → Vault rotates the DB password on every lease renewal. Compromised cred = short-lived.
# ===========================================================================
