# ============================================================
# L03: CI/CD Testing Strategies — Full Testing Pyramid
# ============================================================
# WHAT: A complete GitHub Actions workflow implementing the
#       testing pyramid: unit → integration → e2e, plus linting,
#       security scanning, and coverage reporting.
# WHY:  Automated testing in CI catches regressions before they
#       reach production. The pyramid shape ensures fast feedback
#       (many cheap unit tests run first) while still validating
#       real-world behavior (fewer expensive e2e tests run last).
# LEVEL: Advanced
# ============================================================
# CONCEPT OVERVIEW:
#   The Testing Pyramid (cheapest → most expensive):
#
#         /\
#        /e2\        ← Few, slow, test full user journeys.
#       /----\          Catch integration failures across services.
#      / intg \     ← Some, medium speed, test with real DB/Redis.
#     /--------\       Catch contract and infrastructure bugs.
#    /   unit   \   ← Many, fast (<1s each), test isolated logic.
#   /____________\     Catch bugs cheaply, run on every commit.
#
#   Why pytest over unittest?
#     - No class inheritance required (just def test_*()).
#     - Fixtures are composable and have scopes (function/session).
#     - Plugins: pytest-cov, pytest-mock, pytest-asyncio, pytest-xdist.
#     - Better assertion introspection (no assertEqual — just assert).
#     - Parametrize: @pytest.mark.parametrize runs one test with N inputs.
#
# PRODUCTION USE CASE:
#   Python microservice with FastAPI + PostgreSQL + Redis.
#   Every PR triggers lint → unit → integration in parallel-ish stages.
#   E2E runs only after unit+integration pass to save compute time.
#   Branch protection requires all jobs green before merge.
#
# COMMON MISTAKES:
#   1. Running all tests in a single job → unit test failures block
#      integration setup, wasting container startup time.
#   2. Not health-checking service containers → tests hit DB before
#      Postgres finishes starting → random flaky failures.
#   3. Checking in coverage XML as an artifact without using Codecov →
#      coverage history is invisible.
#   4. Using e2e tests for logic that belongs in unit tests → slow feedback.
#   5. Not cancelling stale PR runs → queue builds up, developers wait.

name: CI Test Suite

# ── Triggers ─────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # allow manual trigger from GitHub UI

# Concurrency: cancel in-progress runs for the same PR/branch.
# This prevents queue buildup when a developer pushes multiple commits quickly.
# group: unique per PR (pull_request.number) or branch (github.ref).
# cancel-in-progress: kills the older run when a new one starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# ── Default settings for all jobs ────────────────────────────
defaults:
  run:
    shell: bash

# ── Environment variables shared across jobs ─────────────────
env:
  PYTHON_VERSION_DEFAULT: "3.11"  # used in single-version jobs
  # Application configuration (non-secret defaults for testing):
  APP_ENV: testing
  LOG_LEVEL: WARNING  # suppress info logs during test runs

# =============================================================
# JOB: lint — Static analysis and formatting checks
# =============================================================
# Runs FIRST and FAST (< 60s). Catches style/type/security issues
# without needing to install test dependencies or start services.
# Fail fast here saves compute on later jobs.
jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          # Cache pip dependencies based on requirements hash.
          # Second run: restore from cache (~5s vs ~30s install).
          cache: pip

      - name: Install lint dependencies
        # Install only what's needed for linting — not the full test suite.
        # This keeps the lint job lean and fast.
        run: pip install ruff mypy bandit

      # ruff: extremely fast Python linter (10-100x faster than flake8).
      # Written in Rust. Replaces: flake8, isort, pyupgrade, and many plugins.
      # check .: lint all Python files in the repo.
      - name: ruff lint
        run: ruff check .

      # ruff format --check: verify formatting without modifying files.
      # Fails if any file would be reformatted (like black --check).
      # Developers must run `ruff format .` locally before pushing.
      - name: ruff format check
        run: ruff format --check .

      # mypy: static type checker. Catches type mismatches before runtime.
      # src/ only: type-check production code, not test helpers.
      # --ignore-missing-imports: skip third-party stubs (add py.typed stubs for strict).
      - name: mypy type check
        run: mypy src/ --ignore-missing-imports

      # bandit: finds common Python security anti-patterns.
      # Examples: hardcoded passwords, use of pickle, SQL injection via string concat.
      # -r: recursive. -ll: only medium/high severity (suppress low).
      - name: bandit security SAST
        run: bandit -r src/ -ll

# =============================================================
# JOB: unit-test — Fast isolated unit tests
# =============================================================
# Matrix: run against multiple Python versions to catch compatibility issues.
# Both versions run in parallel (GitHub spins up separate runners).
# needs: [lint] — only run if lint passes (saves compute on obvious failures).
  unit-test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint]

    strategy:
      # fail-fast: false → if 3.11 fails, keep running 3.12 (see full picture).
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # pip install -e ".[dev]": installs package in editable mode + dev extras.
      # Editable: source code changes are immediately reflected (no reinstall).
      # [dev] extras: test dependencies from pyproject.toml [project.optional-dependencies].
      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      # pytest flags explained:
      #   tests/unit/          → only run unit tests (no DB, no network)
      #   --tb=short           → shorter tracebacks (less noise in CI logs)
      #   -q                   → quiet mode (fewer lines per test)
      #   --cov=src            → measure coverage for the src/ package
      #   --cov-report=xml     → generate coverage.xml (for Codecov upload)
      #   --cov-report=term-missing → print uncovered lines in terminal
      #   --cov-fail-under=80  → fail the job if coverage < 80%
      #   --junitxml=          → JUnit XML for GitHub test result annotations
      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --tb=short -q \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --junitxml=unit-test-results.xml

      # Upload coverage to Codecov: tracks coverage over time, comments on PRs.
      # token: stored as a repository secret (Codecov → Settings → Token).
      # flags: separate report per Python version so matrix results don't merge.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unit-py${{ matrix.python-version }}
          fail_ci_if_error: false  # don't fail CI if Codecov is down

      # Upload JUnit XML as artifact: GitHub reads this and shows test results
      # inline in the PR checks UI (pass/fail per test, click to see failures).
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()  # upload even if tests failed (so we can see what failed)
        with:
          name: unit-test-results-py${{ matrix.python-version }}
          path: unit-test-results.xml
          retention-days: 7

# =============================================================
# JOB: integration-test — Tests against real PostgreSQL and Redis
# =============================================================
# Runs AFTER unit tests pass (needs: unit-test).
# Spins up real service containers (not mocks).
# Tests that queries, transactions, and cache behavior are correct.
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-test]

    # Service containers run as Docker siblings of the runner.
    # They are accessible via localhost on the specified port.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        # health check: WHY? Docker reports the container as "running"
        # as soon as the process starts — but Postgres takes 2-3 seconds
        # to initialize and accept connections. Without a health check,
        # your test setup runs CREATE TABLE before Postgres is ready → error.
        # options tell GitHub Actions to poll until pg_isready returns 0.
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    # Environment variables pointing the app at the test services.
    # These override any values in .env files.
    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Run database migrations before tests.
      # Alembic creates the schema; tests assume the schema exists.
      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            --tb=short \
            --junitxml=integration-test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: integration-test-results.xml
          retention-days: 7

# =============================================================
# JOB: security-scan — Dependency and filesystem vulnerability scan
# =============================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint]
    # Allow viewing results even if scan finds vulnerabilities:
    permissions:
      security-events: write  # required to upload SARIF to Code Scanning

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      - name: Install dependencies
        run: pip install pip-audit

      # pip-audit: checks installed packages against PyPA Advisory Database.
      # Finds Python packages with known CVEs.
      # --fix flag (not used here) can auto-upgrade vulnerable packages.
      - name: Audit Python dependencies (pip-audit)
        run: pip-audit --requirement requirements.txt

      # trivy: scans filesystem for CVEs in OS packages AND Python packages.
      # More comprehensive than pip-audit (also catches transitive deps).
      # sarif: Security Alert Result Interchange Format — GitHub understands this.
      # ignore-unfixed: skip CVEs with no patch available (reduce noise).
      - name: Scan filesystem with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif

      # Upload SARIF to GitHub Code Scanning.
      # Results appear in Security → Code Scanning Alerts tab.
      # PRs get inline annotations for vulnerable code.
      - name: Upload Trivy results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

# =============================================================
# JOB: e2e — Full end-to-end tests against a running Docker stack
# =============================================================
# Runs ONLY after both unit and integration pass.
# Builds the real Docker image, starts the full stack, runs user-journey tests.
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-test, integration-test]  # both must pass first

    env:
      IMAGE_TAG: e2e-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      # Build the Docker image that will run in the e2e environment.
      # Tag with the commit SHA so it's unique per run.
      - name: Build Docker image
        run: docker build -t myapp:${{ env.IMAGE_TAG }} .

      # Start the full application stack: app + DB + Redis + reverse proxy.
      # -d: detach (run in background so we can wait for readiness).
      - name: Start application stack
        run: docker compose up -d
        env:
          APP_IMAGE: myapp:${{ env.IMAGE_TAG }}

      # Wait for the health endpoint to respond before running tests.
      # Without this, tests may hit the app while it's still starting → flaky.
      # Retry loop: try every 5s, up to 60s total.
      - name: Wait for application to be healthy
        run: |
          echo "Waiting for app to be ready..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8000/health; then
              echo "App is ready!"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 5s..."
            sleep 5
          done
          echo "App did not become healthy in time"
          exit 1

      - name: Install e2e test dependencies
        run: pip install -e ".[dev]"

      - name: Run e2e tests
        run: |
          pytest tests/e2e/ \
            --tb=short \
            --junitxml=e2e-test-results.xml
        env:
          BASE_URL: http://localhost:8000

      # On failure: capture all container logs for debugging.
      # Developers can download this artifact to see exactly what happened.
      - name: Capture container logs on failure
        if: failure()
        run: docker compose logs > docker-compose-logs.txt

      - name: Upload container logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: docker-compose-logs.txt
          retention-days: 3

      - name: Upload e2e test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: e2e-test-results.xml
          retention-days: 7

      - name: Tear down stack
        if: always()  # clean up even if tests failed
        run: docker compose down -v  # -v removes named volumes (clean state)

# =============================================================
# BRANCH PROTECTION NOTE
# =============================================================
# To enforce this pipeline in GitHub:
#   Settings → Branches → Add rule → Branch name pattern: main
#   ✓ Require status checks to pass before merging
#     Add required checks: lint, unit-test, integration-test, e2e
#   ✓ Require branches to be up to date before merging
#     (ensures tests ran against latest main, not stale base)
#
# With this, no PR can merge to main unless all 4 jobs are green.
# This is the minimal viable branch protection for a production service.
