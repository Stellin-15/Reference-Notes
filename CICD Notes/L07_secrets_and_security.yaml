# =============================================================================
# WHAT: CI/CD Secrets Management and Pipeline Security
# WHY:  Leaked CI secrets = complete infrastructure compromise. A single
#       accidentally logged AWS key can let attackers mine crypto, exfiltrate
#       data, or destroy your entire cloud account within minutes.
# LEVEL: Senior / Architect — production systems at scale
# =============================================================================
#
# CONCEPT OVERVIEW
# ----------------
# The CI/CD pipeline is one of the highest-value attack targets:
#   - It has credentials to deploy to production
#   - It runs untrusted code (dependency packages, user PRs)
#   - It has network access to internal systems
#   - Compromise = silent backdoor in every artifact you ship
#
# Defense in depth:
#   1. No long-lived secrets in CI (OIDC, Vault dynamic secrets)
#   2. Secrets scoped to the narrowest environment
#   3. Scan code for accidentally committed secrets
#   4. Scan code for vulnerabilities (SAST, dependency scan)
#   5. Scan container images before push
#   6. Supply chain attestation (SLSA, SBOM)
#
# PRODUCTION USE CASE
# -------------------
# A fintech platform: CI must deploy to AWS, push to ECR, update RDS.
# Old way: AWS_ACCESS_KEY_ID in GitHub secrets, rotated manually (often not).
# New way: OIDC — no stored credentials. Each run gets a 15-minute token.
#
# COMMON MISTAKES
# ---------------
# - Storing cloud credentials as long-lived GitHub secrets
# - Using the same secrets for staging and production
# - Allowing PRs from forks to access environment secrets
# - Not scanning dependencies (most breaches come through supply chain)
# - Printing secrets in CI logs (echo $SECRET_KEY)
# =============================================================================

---
# =============================================================================
# GITHUB ACTIONS SECRETS: Types and scoping
# =============================================================================
# THREE LEVELS of secrets (narrowest scope = least blast radius):
#
# 1. Repository secrets:     Visible to all workflows in one repo
# 2. Environment secrets:    Scoped to a GitHub Environment (staging/prod)
#                            Can require reviewer approval before secrets are exposed
#                            PRs from FORKS cannot access environment secrets
# 3. Organization secrets:   Shared across repos, controlled by org admins
#
# MASKING: GitHub Actions automatically masks secret values in logs.
# But: if you base64-encode a secret, the encoded value is NOT masked.
# And: multi-line secrets can leak partial lines. Vault is safer.
# =============================================================================

name: secure-pipeline-with-oidc
on:
  push:
    branches: [main]
  pull_request:

# LEAST PRIVILEGE: Grant minimum permissions at workflow level.
# Default used to be write-all — this is a significant security risk.
# Override with specific permissions per job.
permissions:
  contents: read                 # Read the repo code
  id-token: write                # Required for OIDC token generation
  packages: write                # Push to GHCR
  security-events: write         # Upload SARIF results (SAST/container scan)

jobs:
  # =============================================================================
  # OIDC: Keyless Cloud Authentication
  # =============================================================================
  # PROBLEM: Storing AWS_ACCESS_KEY_ID in GitHub secrets means:
  #   - Long-lived credential (often never rotated)
  #   - If leaked → attacker has your AWS access indefinitely
  #   - Audit logs don't show which CI run used it
  #
  # SOLUTION: OpenID Connect (OIDC)
  #   1. GitHub generates a short-lived JWT (identity token) for each run
  #   2. Token identifies: org, repo, branch, workflow, run ID
  #   3. AWS/GCP/Azure validates token against GitHub's JWKS endpoint
  #   4. Cloud issues a temporary STS credential (15-min lifetime)
  #   5. No stored secrets. No rotation. Automatic audit trail.
  #
  # AWS SETUP (done once in Terraform/console):
  #   - Create IAM Identity Provider: token.actions.githubusercontent.com
  #   - Create IAM Role with trust policy:
  #     {
  #       "Condition": {
  #         "StringEquals": {
  #           "token.actions.githubusercontent.com:sub":
  #             "repo:myorg/myrepo:ref:refs/heads/main"
  #           }
  #         }
  #       }
  #     }
  #   - Attach policy with only the permissions CI needs (e.g., ECR push, EKS deploy)
  # =============================================================================

  deploy-with-oidc:
    name: Deploy via OIDC (no stored credentials)
    runs-on: ubuntu-latest
    environment: production          # Use GitHub Environment for approval gate
    timeout-minutes: 20
    permissions:
      id-token: write                # MUST be set to request OIDC token
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789:role/github-actions-deploy
          # The role ARN — trust policy limits this to your specific repo/branch
          aws-region: us-east-1
          # No access-key-id or secret-access-key needed!
          # The action requests OIDC token, exchanges for STS credentials automatically

      - name: Verify assumed role (audit)
        run: aws sts get-caller-identity  # Shows which role was assumed in logs

  # =============================================================================
  # VAULT INTEGRATION: Dynamic Secrets
  # =============================================================================
  # Vault goes further than OIDC: it generates one-time secrets per CI run.
  # Dynamic DB secrets: each CI run gets a unique Postgres user with a password
  # that expires in 30 minutes. No shared credentials. Automatic rotation.
  # =============================================================================

  vault-dynamic-secrets:
    name: Use Vault dynamic secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt                       # Authenticate Vault with GitHub OIDC token
          role: github-actions-deploy       # Vault role — policies limit what it can read
          secrets: |
            secret/data/myapp/prod db_url | DATABASE_URL ;
            aws/creds/deploy access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/deploy secret_key | AWS_SECRET_ACCESS_KEY
          # The aws/creds path is Vault's AWS secrets engine — it creates a REAL
          # temporary IAM user on the fly and deletes it when the lease expires.

  # =============================================================================
  # SECRET SCANNING: Detect accidentally committed secrets
  # =============================================================================
  # Tools:
  #   - Gitleaks:    Regex patterns for 150+ secret types. Fast. Use as pre-commit hook.
  #   - TruffleHog:  Deep git history scan. Finds secrets in old commits.
  #   - detect-secrets: Yelp's tool, good for preventing new secrets (not finding old)
  #
  # Run BOTH in CI: gitleaks for the current diff, trufflehog for history.
  # CRITICAL: Also install gitleaks as a pre-commit hook locally to catch before push.
  # =============================================================================

  secret-scanning:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # Full history for trufflehog historical scan

      - name: Gitleaks — scan current PR diff
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Fails the pipeline if any secrets detected in the diff
        # Configure exceptions in .gitleaks.toml for test fixtures/false positives

      - name: TruffleHog — deep history scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified  # Only verified real secrets (fewer false positives)

  # =============================================================================
  # SAST: Static Application Security Testing
  # =============================================================================
  # SAST = analyze code without running it. Find injection, XSS, hardcoded creds,
  # crypto misuse, path traversal, etc. before they reach production.
  #
  # Tools:
  #   - Semgrep:  Fast, rule-based, community rules for Python/JS/Java/Go/etc.
  #               Custom rules for your business logic. Free for open source.
  #   - CodeQL:   GitHub-native, deeper analysis, catches subtle bugs.
  #               Free for public repos. SARIF output → GitHub Security tab.
  #   - Bandit:   Python-specific security linter (comes with many rule sets)
  #   - ESLint security plugins: eslint-plugin-security for Node.js
  # =============================================================================

  sast:
    name: SAST — Static security analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write        # Upload SARIF to GitHub Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrets
            p/jwt
          # Upload results to GitHub Security tab as SARIF
          generateSarif: "1"
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python          # Also: javascript, java, go, cpp, csharp, ruby

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:python

  # =============================================================================
  # DEPENDENCY SCANNING: Find vulnerable packages
  # =============================================================================
  # 80%+ of modern app code comes from third-party packages.
  # Log4Shell, Heartbleed, event-stream — all supply chain attacks.
  # Scan every PR, block on CRITICAL, warn on HIGH.
  #
  # Tools by ecosystem:
  #   Python:  pip-audit (uses PyPI advisory DB), safety (requires license for full DB)
  #   Node.js: npm audit, yarn audit, snyk
  #   Java:    OWASP dependency-check, snyk
  #   Go:      govulncheck (official Go tool), nancy
  # =============================================================================

  dependency-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: pip-audit — Python dependency scan
        run: |
          pip install pip-audit
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output pip-audit-results.json \
            --fail-on CRITICAL \
            # Will exit non-zero if any CRITICAL vulnerabilities found
            # HIGH vulnerabilities are reported but don't fail the build
            # Adjust --fail-on based on your risk tolerance

      - name: Upload pip-audit results
        if: always()               # Upload even if scan fails
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  # =============================================================================
  # CONTAINER SCANNING: Scan Docker images for vulnerabilities
  # =============================================================================
  # Your base image (python:3.12-slim) has OS packages that may have CVEs.
  # Your app's dependencies are also in the image.
  # Scan BEFORE pushing to registry.
  #
  # Tools:
  #   - Trivy:   Aqua Security. Scans OS packages + language deps. Fast. Free.
  #   - Grype:   Anchore. Similar to Trivy.
  #   - Snyk:    Commercial with better remediation advice.
  #   - Clair:   CoreOS/Quay. Older, less actively maintained.
  #
  # Policy: CRITICAL OS vulnerabilities = block. HIGH = warn. Update base image weekly.
  # =============================================================================

  container-scan:
    name: Container image security scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning (don't push yet)
        run: docker build -t myapp:scan-target .

      - name: Trivy — container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:scan-target
          format: sarif               # GitHub Security tab integration
          output: trivy-results.sarif
          severity: CRITICAL,HIGH     # Report these severity levels
          exit-code: '1'             # Fail pipeline on CRITICAL findings
          ignore-unfixed: true        # Skip CVEs with no fix available yet
                                      # (can't fix what has no patch)
          vuln-type: os,library       # Scan both OS packages and language packages

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # =============================================================================
  # SBOM: Software Bill of Materials
  # =============================================================================
  # SBOM = manifest of every component in your software (like ingredients list).
  # Required by Executive Order 14028 (US government suppliers).
  # Enables: rapid CVE response (which of my apps uses log4j?), compliance, licensing.
  #
  # Formats: SPDX (Linux Foundation), CycloneDX (OWASP)
  # Tools: syft (generates SBOM from container), cosign (signs/attests SBOM)
  # =============================================================================

  generate-sbom:
    name: Generate and attest SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [container-scan]
    steps:
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/myorg/myapp:${{ github.sha }}
          format: spdx-json          # SPDX format for compliance

  # =============================================================================
  # BRANCH PROTECTION: Enforce security policy at git level
  # =============================================================================
  # Configure via GitHub Settings > Branches > Branch protection rules for "main":
  #   ✅ Require a pull request before merging
  #   ✅ Require approvals: 2 (for production code)
  #   ✅ Dismiss stale reviews when new commits are pushed
  #   ✅ Require review from code owners (CODEOWNERS file)
  #   ✅ Require status checks to pass before merging
  #       - CI/lint, CI/tests, CI/security-scan, CI/container-scan
  #   ✅ Require branches to be up to date before merging
  #   ✅ Require signed commits (GPG signing)
  #   ✅ Include administrators (no bypassing for anyone)
  #   ✅ Restrict who can push: only CI robot account
  # =============================================================================

  # =============================================================================
  # SLSA: Supply chain Levels for Software Artifacts
  # =============================================================================
  # SLSA (pronounced "salsa") is a framework for supply chain security.
  # Four levels, progressively stricter:
  #
  #   Level 1: Build process is scripted/automated. SBOM generated.
  #   Level 2: Build uses version control + hosted build service (GitHub Actions).
  #            Provenance generated and signed.
  #   Level 3: Build is isolated (ephemeral environment). Source verified.
  #            Two-party review. All build steps documented.
  #   Level 4: Hermetic builds (reproducible). Two-person review. Paranoid.
  #
  # For most companies, SLSA Level 2 is the right target.
  # Provenance = cryptographic attestation of WHAT built WHAT, WHEN, and HOW.
  # =============================================================================

  slsa-provenance:
    name: Generate SLSA provenance
    needs: [deploy-with-oidc]
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ghcr.io/myorg/myapp
      digest: ${{ needs.deploy-with-oidc.outputs.image-digest }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}
